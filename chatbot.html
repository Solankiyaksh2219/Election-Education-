<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ask election-related questions and get instant answers from our AI assistant.">
  <title>Ask AI — Election Assistant</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="styles.css">
  <style>
    .chat-wrapper { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; height: calc(100vh - var(--nav-height) - 60px); padding-bottom: 20px; }
    .chat-header { text-align: center; padding: 30px 0 20px; flex-shrink: 0; }
    .chat-header h1 { font-size: 1.8rem; margin-bottom: 6px; }
    .chat-header p { font-size: 0.95rem; }
    .chatbox { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg-glass); border: 1px solid var(--bg-glass-border); border-radius: var(--radius-lg) var(--radius-lg) 0 0; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; }
    .chatbox::-webkit-scrollbar { width: 6px; }
    .chatbox::-webkit-scrollbar-track { background: transparent; }
    .chatbox::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    .msg { max-width: 80%; padding: 14px 18px; border-radius: var(--radius-md); font-size: 0.95rem; line-height: 1.6; animation: msgIn 0.3s ease; }
    .msg.user { align-self: flex-end; background: var(--accent-blue); color: white; border-bottom-right-radius: 4px; }
    .msg.bot { align-self: flex-start; background: rgba(255,255,255,0.08); color: var(--text-primary); border-bottom-left-radius: 4px; }
    .msg.bot .bot-label { font-size: 0.75rem; font-weight: 600; color: var(--accent-violet); margin-bottom: 6px; display: block; }
    .typing { align-self: flex-start; padding: 14px 20px; background: rgba(255,255,255,0.08); border-radius: var(--radius-md); display: flex; gap: 5px; }
    .typing span { width: 8px; height: 8px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    .chat-input-area { display: flex; gap: 10px; padding: 14px 20px; background: var(--bg-glass); border: 1px solid var(--bg-glass-border); border-top: none; border-radius: 0 0 var(--radius-lg) var(--radius-lg); flex-shrink: 0; }
    .chat-input-area input { flex: 1; padding: 12px 18px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-full); color: var(--text-primary); font-family: var(--font-body); font-size: 0.95rem; outline: none; transition: var(--transition-fast); }
    .chat-input-area input::placeholder { color: var(--text-muted); }
    .chat-input-area input:focus { border-color: var(--accent-blue); background: rgba(255,255,255,0.08); }
    .chat-input-area button { padding: 12px 24px; background: var(--gradient-blue-violet); border: none; border-radius: var(--radius-full); color: white; font-family: var(--font-body); font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: var(--transition-smooth); }
    .chat-input-area button:hover { transform: translateY(-1px); box-shadow: 0 4px 16px var(--accent-blue-glow); }
    .quick-btns { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 0; flex-shrink: 0; justify-content: center; }
    .quick-btn { padding: 7px 16px; background: var(--bg-glass); border: 1px solid var(--bg-glass-border); border-radius: var(--radius-full); font-family: var(--font-body); font-size: 0.82rem; color: var(--text-secondary); cursor: pointer; transition: var(--transition-fast); }
    .quick-btn:hover { background: rgba(59,130,246,0.12); color: var(--accent-blue); border-color: rgba(59,130,246,0.3); }
    @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
    @media (max-width:768px) { .chat-wrapper { height: calc(100vh - 60px - 40px); } .msg { max-width: 90%; } }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div class="container">
      <div class="chat-wrapper">
        <div class="chat-header">
          <h1>🤖 <span class="gradient-text">Ask the AI</span></h1>
          <p>Ask anything about elections — I'll answer instantly!</p>
        </div>
        <div class="quick-btns" id="quickBtns">
          <button class="quick-btn">What is EVM?</button>
          <button class="quick-btn">How to register?</button>
          <button class="quick-btn">Who can vote?</button>
          <button class="quick-btn">Election timeline</button>
          <button class="quick-btn">What is NOTA?</button>
          <button class="quick-btn">How are votes counted?</button>
        </div>
        <div class="chatbox" id="chatbox">
          <div class="msg bot"><span class="bot-label">🤖 Election AI</span>Welcome! I'm your Election Assistant. Ask me anything about the Indian election process — voting, candidates, timelines, and more. Try the quick buttons above to get started!</div>
        </div>
        <div class="chat-input-area">
          <input type="text" id="chatInput" placeholder="Ask about elections..." autocomplete="off">
          <button onclick="sendMessage()" id="sendBtn">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script src="nav.js"></script>
  <script>
    const chatbox = document.getElementById('chatbox');
    const chatInput = document.getElementById('chatInput');
    const API_KEY = 'AIzaSyC5HrCA0Fzp1votONW1E20An_XU0UFRbeg';
    const SYSTEM_PROMPT = "You are a specialized Election Process Assistant for India. Help users understand timelines, voting eligibility, registration steps, EVM/VVPAT, and political parties. Be neutral, educational, and concise. Avoid political bias.";

    function addMsg(text, type) {
      const div = document.createElement('div');
      div.className = 'msg ' + type;
      if (type === 'bot') {
        div.innerHTML = '<span class="bot-label">🤖 Election AI</span>' + text.replace(/\n/g, '<br>');
      } else {
        div.textContent = text;
      }
      chatbox.appendChild(div);
      chatbox.scrollTop = chatbox.scrollHeight;
      return div;
    }

    async function getAIResponse(userMessage) {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{
              role: "user",
              parts: [{ text: SYSTEM_PROMPT + "\n\nUser Question: " + userMessage }]
            }]
          })
        });
        const data = await response.json();
        if (data.candidates && data.candidates[0].content) {
          return data.candidates[0].content.parts[0].text;
        } else if (data.error) {
          return "Error: " + data.error.message;
        }
        return "I'm having trouble connecting. Please try again.";
      } catch (error) {
        return "Connection Error. Please check your internet.";
      }
    }

    async function sendMessage(text) {
      const msgText = text || chatInput.value.trim();
      if (!msgText) return;

      if (!text) chatInput.value = '';
      addMsg(msgText, 'user');

      // Show typing indicator
      const typingDiv = document.createElement('div');
      typingDiv.className = 'typing';
      typingDiv.innerHTML = '<span></span><span></span><span></span>';
      chatbox.appendChild(typingDiv);
      chatbox.scrollTop = chatbox.scrollHeight;

      const response = await getAIResponse(msgText);
      typingDiv.remove();
      addMsg(response, 'bot');
    }

    chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

    document.querySelectorAll('.quick-btn').forEach(btn => {
      btn.addEventListener('click', () => sendMessage(btn.textContent));
    });
  </script>
</body>
</html>
